# Keeps Supabase database active by pinging it daily
# Supabase free tier pauses projects after ~7 days of inactivity
# This workflow runs a lightweight query to prevent pausing

name: Keep Supabase Alive

on:
  schedule:
    # Runs daily at 10:00 AM UTC
    - cron: '0 10 * * *'
  workflow_dispatch:
    # Allows manual trigger from GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase database
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X GET \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/apartments?select=id&limit=1")
          
          if [ "$response" = "200" ] || [ "$response" = "206" ]; then
            echo "✅ Supabase ping successful (HTTP $response)"
          else
            echo "❌ Supabase ping failed (HTTP $response)"
            exit 1
          fi
